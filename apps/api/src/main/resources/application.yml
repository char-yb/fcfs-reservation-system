redis:
  reservation:
    command-timeout-ms: 200
    connect-timeout-ms: 1000

resilience4j:
  circuitbreaker:
    instances:
      redis:
        # 예약 1건은 Redis counter + distributed lock으로 최소 2 Redis ops를 사용한다.
        # 인스턴스당 100 booking TPS를 기준으로 보면 약 200 Redis ops/s이고, 100개 표본은 약 0.5초 분량이라 장애 감지는 빠르되 1~2회 timeout으로 circuit이 열리지 않는다.
        sliding-window-type: COUNT_BASED
        sliding-window-size: 100
        # 100 TPS 기준 약 0.1초 분량의 20 Redis ops가 쌓인 뒤부터 평가한다. Redis 완전 장애는 빠르게 열고, 저 TPS 환경에서도 과도한 지연 없이 판별한다.
        minimum-number-of-calls: 20
        # 표본의 절반 이상이 실패하면 DB-only fallback으로 전환한다. Redis 순간 오류 1~2건은 흡수하되, 장애가 실제 요청 절반을 넘으면 빠르게 우회한다.
        failure-rate-threshold: 50
        # OPEN 상태에서는 Redis 재시도를 요청마다 반복하지 않고 5초 동안 DB 정합성 경로로 흘린다. 너무 길게 잡으면 Redis 회복 후에도 DB 부하가 오래 지속된다.
        wait-duration-in-open-state: 5s
        # HALF_OPEN은 10개 Redis 호출만 통과시켜 회복 여부를 확인한다. 100 TPS 기준 약 50ms 분량이라 회복 판단이 빠르고 Redis 재가열 부하도 제한된다.
        permitted-number-of-calls-in-half-open-state: 10
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - org.redisson.client.RedisException

spring:
  application:
    name: fcfs-reservation
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    property-naming-strategy: LOWER_CAMEL_CASE

---
spring:
  config:
    activate:
      on-profile: local
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    baseline-on-migrate: false

redis:
  reservation:
    host: localhost
    port: 6379

datasource:
  reservation:
    driver-class-name: org.h2.Driver
    jdbc-url: jdbc:h2:mem:fcfs;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
    username: sa
    password:
    pool-name: reservation-local-pool
    maximum-pool-size: 10
    connection-timeout: 3000
    validation-timeout: 1000

---
spring:
  config:
    activate:
      on-profile: prod
  flyway:
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true

redis:
  reservation:
    host: ${REDIS_RESERVATION_HOST}
    port: ${REDIS_RESERVATION_PORT:6379}

datasource:
  reservation:
    driver-class-name: com.mysql.cj.jdbc.Driver
    jdbc-url: ${DATASOURCE_RESERVATION_JDBC_URL}
    username: ${DATASOURCE_RESERVATION_USERNAME}
    password: ${DATASOURCE_RESERVATION_PASSWORD}
    pool-name: reservation-pool
    maximum-pool-size: 30
    minimum-idle: 5
    connection-timeout: 3000
    validation-timeout: 1000
    keepalive-time: 30000
    max-lifetime: 1800000
